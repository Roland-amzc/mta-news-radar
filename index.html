<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人多领域雷达</title>
    <meta name="description" content="按主题分轨的个人资讯雷达:前沿大模型、AI-Health、量化因子、新书、播客、实体雷达。" />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/radar.css?v=3" />
  </head>
  <body>
    <div class="layout" id="layout">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <h1>多领域雷达</h1>
          <p class="brand-tag">NEWS RADAR</p>
        </div>
        <nav class="topic-nav" id="topicNav" aria-label="主题导航"></nav>
        <div class="sidebar-foot" id="updatedAt">加载中…</div>
      </aside>

      <main class="content">
        <button class="nav-toggle" id="navToggle" type="button" aria-label="主题菜单">☰ 主题</button>
        <section class="topic-header" id="topicHeader" aria-live="polite"></section>
        <details class="health" id="healthDetail" hidden>
          <summary>源状态详情</summary>
          <div class="health-body" id="healthDetailBody"></div>
        </details>
        <div class="message" id="message" role="status" hidden></div>
        <section class="news-list" id="newsList" aria-label="条目列表"></section>
        <div class="load-more" id="loadMoreWrap" hidden>
          <button id="loadMoreBtn" type="button">加载更多</button>
        </div>
      </main>
    </div>

    <div class="scrim" id="scrim" hidden></div>

    <template id="itemTpl">
      <article class="card">
        <a class="card-title" target="_blank" rel="noopener noreferrer"></a>
        <div class="card-subtitle" hidden></div>
        <p class="card-summary" hidden></p>
        <button class="card-expand" type="button" hidden>展开全文</button>
        <div class="card-meta">
          <span class="card-source"></span>
          <span class="card-sublabel" hidden></span>
          <time class="card-time"></time>
          <a class="card-audio" target="_blank" rel="noopener noreferrer" hidden>▶ 收听</a>
          <span class="card-score" hidden></span>
        </div>
      </article>
    </template>

    <script src="./assets/radar.js?v=3" defer></script>
  </body>
</html>
