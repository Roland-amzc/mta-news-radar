  # === 7. 实体雷达（盯人/盯频道，全收）====================================
  - id: entity_radar
    name: 实体雷达
    mode: entity
    window: 72h
    scorer: none
    sources:
      # --- 盯人 ---
      - name: 姚顺宇 (Google DeepMind)
        type: arxiv_author
        author_id: "TODO"
        enabled: false        # 本期禁用：无可用 arXiv 身份，引擎跳过(status=skipped)
        tier: entity
        status: todo
        note: >
          ⚠️ 已人工核验(2026-07-01)：确认「姚顺宇」(清华物理→斯坦福理论物理博士→
          2024入职Anthropic→2026-09跳槽Google DeepMind任Senior Staff Research
          Scientist)与「姚顺雨/Shunyu Yao」(ReAct论文作者, Princeton→OpenAI→
          腾讯首席AI科学家)确系两人，英文罗马拼音撞了，需锚定作者ID防混淆。
          但唯一能干净定位到姚顺宇本人的 arXiv 作者页是 arxiv.org/a/yao_s_2——
          该ID下17篇论文全是他转AI之前(2017-2024)的物理学论文(非厄米拓扑系统/
          量子引力)，不含他在Anthropic/DeepMind的AI/agent工作(大厂内部研究常不
          公开发arXiv，或发了但未挂可辨识身份)。接入yao_s_2会在"实体雷达"里吐出
          一堆无关物理论文，与"盯人AI动态"的用途不符。故意保持 skipped，不接入
          错误数据。若他未来以本人身份发AI方向论文，可在此补上新author_id。
          非arXiv监控(个人站alfredyao.github.io / 官方公告页)属scrape类适配器，
