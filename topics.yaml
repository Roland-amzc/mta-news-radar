# =============================================================================
# topics.yaml — 个人多领域雷达 · 主题注册表（草案 v0.1，待用户审）
# -----------------------------------------------------------------------------
# 来源：ai-news-radar-PLAN.md 的 7 主题框架（定稿 2026-06-30）
# 作用：一个注册表喂同一引擎 → 每主题独立产出 data/<topic_id>/*.json
# 本文件尚未接引擎；先审 → 再谈改造 update_news.py / GitHub Actions / Pages。
#
# 字段约定
#   mode    : topic（关键词匹配领域，打分）| entity（盯人/盯频道，全收不打分）
#   window  : 每主题独立时间窗（72h / 1w / 2w ...）—— 不再用原版全局 24h 滚动窗
#   scorer  : keyword_prefilter+llm（粗筛→LLM，控 token）| llm | keyword | none
#   source.type : rss | arxiv | arxiv_author | podcast | youtube | scrape | x_account
#   source.tier : official 官方一手 > media 专业媒体 > aggregator 聚合站
#                 > self_media 个人博客/substack > entity 盯人对象
#                 （对齐引擎 SOURCE_TIER_IMPORTANCE 的层级思路）
#   source.status : ok     已 HTTP 实测 200 且返回 feed（2026-06-30 本机核验）
#                   verify 大概率可用但本机被 Cloudflare/超时挡住，部署环境再确认
#                   todo   无现成 feed / 需人工补 ID，下一步处理
#
# 本期可运行源类型：rss / arxiv / arxiv_author / podcast / youtube。
# 引擎对以下源「解析但跳过」(source_health 记 status=skipped，不报错、不抓取)：
#   - type 为 scrape / x_account（适配器后续做）
#   - enabled: false
#   - arxiv_author 且 author_id 为 "TODO"
# topic 字段 keywords：用于主题相关性打分(KeywordScorer)，与高频源粗筛用的
#   prefilter_keywords 分开。entity 模式(scorer=none)不需要 keywords。
# =============================================================================

version: 1

defaults:
  recency_unit: hours

# -----------------------------------------------------------------------------
topics:

  # === 1. 前沿大模型·Agent·具身（三合一）===================================
  - id: frontier
    name: 前沿大模型·Agent·具身
    mode: topic
    window: 72h
    scorer: keyword_prefilter+llm
    sub_labels: [model_release, agent, embodied]
    # arXiv 粗筛关键词（粗筛后再交 LLM 精判，控 token）
    prefilter_keywords: [agent, agentic, LLM, "large language model", reasoning, multimodal, embodied, robot, manipulation, "vision-language-action", VLA, RLHF, "tool use", "model release"]
    # 主题相关性打分关键词（KeywordScorer 用，作用于 title+summary）
    keywords: [大模型, LLM, GPT, Claude, Gemini, Qwen, DeepSeek, agent, 智能体, reasoning, 推理, multimodal, 多模态, "open-source", 开源, "model release", 具身, embodied, robot, 机器人, RLHF, inference, 推理优化]
    sources:
      # --- 官方大模型实验室博客 ---
      - { name: OpenAI 官博,            url: "https://openai.com/news/rss.xml",        type: rss,   tier: official, sub_label: model_release, status: ok }
      - { name: Google DeepMind 官博,   url: "https://deepmind.google/blog/rss.xml",    type: rss,   tier: official, sub_label: model_release, status: ok }
      - { name: 通义 Qwen 官博,         url: "https://qwenlm.github.io/blog/index.xml", type: rss,   tier: official, sub_label: model_release, status: ok }
      - { name: Mistral 官博,           url: "https://mistral.ai/rss.xml",              type: rss,   tier: official, sub_label: model_release, status: ok }
      - name: Anthropic News
        url: "https://www.anthropic.com/news"
        type: scrape
        tier: official
        sub_label: model_release
        status: ok
        enabled: true
        item_selector: 'a[href^="/news/"]'
        title_selector: "h4"
        date_selector: "time"
        note: >
          无官方 RSS（/rss.xml /news/rss.xml 均 404），已接 scrape 适配器
          (2026-07-01 试点验证)。选择器锚在语义标签(h4/time)而非 CSS-module
          哈希类名，扛得住样式重构。若 Anthropic 改版导致选择器失效，
          engine 会把该源标 status=failed（selector matched no usable cards）。
      - name: Meta AI 官博
        url: "https://ai.meta.com/blog/"
        type: scrape
        tier: official
        sub_label: model_release
        status: todo
        enabled: false        # scrape 已实现，但本源未核选择器，先禁用避免 ConfigError
        note: >
          无 RSS(/blog/rss/ /blog/feed/ 404,/blog/rss.xml 400)。2026-07-02 探测:直接 GET
          /blog/ 返回 400(Meta 边缘拦截,即便带浏览器 UA),静态 scrape 拿不到页面。需无头浏览器
          或第三方桥,暂缓。
      - name: DeepSeek 官博
        url: "https://api-docs.deepseek.com/news"
        type: scrape
        tier: official
        sub_label: model_release
        status: todo
        enabled: false        # scrape 已实现，但本源未核选择器，先禁用避免 ConfigError
        note: >
          2026-07-02 探测:api-docs.deepseek.com/news 及 /news/ 均 404,无静态新闻列表页。
          DeepSeek 官方动态主要在公众号/X(@deepseek_ai),无可抓取的公开新闻页。暂缓,可考虑盯 X 账号。
      - name: xAI News
        url: "https://x.ai/news/rss.xml"
        type: rss
        tier: official
        sub_label: model_release
        status: todo
        enabled: false   # 该地址 404（不存在 RSS）,GitHub Actions 与本机一致。禁用避免长期红失败
        note: >
          x.ai/news/rss.xml 实测 404（非 UA 问题,浏览器 UA 也 404,该 feed 不存在）。
          xAI 官网无公开 RSS。要盯 xAI 只能走 scrape（抓 x.ai/news 页,scrape 适配器已就绪,
          补 item_selector/title_selector 后改 enabled:true）或盯 @xai X 账号。先禁用。
      # --- arXiv（高频，关键词粗筛→LLM 精判）---
      - { name: "arXiv cs.CL", url: "http://export.arxiv.org/rss/cs.CL", type: arxiv, tier: official, sub_label: model_release, status: ok, prefilter: true }
      - { name: "arXiv cs.LG", url: "http://export.arxiv.org/rss/cs.LG", type: arxiv, tier: official, sub_label: model_release, status: ok, prefilter: true }
      - { name: "arXiv cs.AI", url: "http://export.arxiv.org/rss/cs.AI", type: arxiv, tier: official, sub_label: agent,         status: ok, prefilter: true }
      - { name: "arXiv cs.MA", url: "http://export.arxiv.org/rss/cs.MA", type: arxiv, tier: official, sub_label: agent,         status: ok, prefilter: true }
      - { name: "arXiv cs.RO", url: "http://export.arxiv.org/rss/cs.RO", type: arxiv, tier: official, sub_label: embodied,      status: ok, prefilter: true }
      # --- 资讯/分析 ---
      - { name: "Latent Space（写）", url: "https://www.latent.space/feed", type: rss, tier: self_media, sub_label: agent, status: ok }
      # --- 具身机器人 ---
      - { name: Boston Dynamics Blog, url: "https://bostondynamics.com/feed/", type: rss, tier: official, sub_label: embodied, status: ok }
      - name: Figure
        url: "https://www.figure.ai/news"
        type: x_account
        handle: "@Figure_robot"
        tier: official
        sub_label: embodied
        status: todo
        note: 官网无 RSS（404）。建议走引擎现有 X/SocialData 路盯官方账号，或抓取 news 页。
      - { name: "1X",                   url: "https://www.1x.tech/",                       type: scrape, handle: "@1x_tech",            tier: official, sub_label: embodied, status: todo, enabled: false, note: "2026-07-02 探测:Next.js SPA(有 __NEXT_DATA__,列表由 JS 渲染),requests+CSS 选择器抓不到文章列表。静态 scrape 不适用,需无头浏览器或从 __NEXT_DATA__ JSON 解析(超出当前 ScrapeFetcher 能力),暂缓" }
      - name: "Physical Intelligence (π)"
        url: "https://www.physicalintelligence.company/"
        type: scrape
        handle: "@physical_int"
        tier: official
        sub_label: embodied
        status: ok
        enabled: true
        item_selector: 'a[href^="/blog/"]'
        title_selector: ".font-semibold"
        date_selector: ".text-muted-foreground.shrink-0"
        note: >
          无 RSS,已接 scrape(2026-07-02 验证:首页 SSR 出 7 篇 blog 卡片,标题+日期均正确解析)。
          ⚠️ 选择器锚在 Tailwind 工具类(.font-semibold/.text-muted-foreground.shrink-0)而非语义
          标签——该站卡片全是 div 无 h/time 标签,只能用工具类,前端重构会让选择器失效(engine 标
          status=failed)。72h 窗口下多数时候 0 条(PI 发文低频),有新文才现,与 Unitree/Anthropic
          scrape 源行为一致。
      - name: 宇树 Unitree
        url: "https://www.unitree.com/news/"
        type: scrape
        tier: official
        sub_label: embodied
        status: ok
        enabled: true
        item_selector: 'a[href^="/news/"]'
        title_selector: "p.title"
        date_selector: "p.date"
        note: >
          国内厂商无英文 RSS，已接 scrape 适配器(2026-07-01 试点验证)。原
          url https://www.unitree.com/ 是产品导航首页无新闻列表，实际新闻页
          在 /news（302 跳转到 /news/，已改为直连 /news/ 避免重定向依赖）。
      - { name: "智元 AgiBot",           url: "https://www.zhiyuan-robot.com/news",         type: scrape, tier: official, sub_label: embodied, status: todo, enabled: false, note: "2026-07-02 探测:/news 页 200 但新闻走 /News/Company 分类 + 分页(?page=N),文章链接非稳定 slug 模式,且卡片无机器可读日期,静态抓取会灌入全部历史条目污染 72h 窗口。国内厂商站结构复杂,暂缓" }

  # === 2. AI-Health：药物发现 + CDMO ======================================
  - id: ai_health
    name: AI-Health（药物发现 + CDMO）
    mode: topic
    window: 1w
    scorer: llm
    keywords: ["drug discovery", 药物发现, target, 靶点, "clinical trial", 临床, FDA, molecule, 分子, protein, 蛋白, AlphaFold, CDMO, biotech, pharma, 生物制药, antibody, 抗体, oncology, 肿瘤, "AI drug", 药物设计]
    sources:
      - { name: bioRxiv (all),               url: "http://connect.biorxiv.org/biorxiv_xml.php?subject=all",   type: rss, tier: official, status: ok, note: "可按 subject 细分，如 bioinformatics" }
      - { name: medRxiv (all),               url: "http://connect.medrxiv.org/medrxiv_xml.php?subject=all",   type: rss, tier: official, status: ok }
      - { name: Nature Biotechnology,        url: "https://www.nature.com/nbt.rss",            type: rss, tier: official, status: verify, note: "本机连接超时(000)；URL 为 Nature 标准格式，GitHub Actions 环境大概率可用" }
      - { name: Nature Machine Intelligence, url: "https://www.nature.com/natmachintell.rss",  type: rss, tier: official, status: verify, note: "同上(000)，标准格式" }
      - { name: Endpoints News,              url: "https://endpts.com/feed/",                  type: rss, tier: media,    status: ok, note: "需带浏览器 UA，引擎默认 UA 可能被 403" }
      - { name: FierceBiotech,               url: "https://www.fiercebiotech.com/rss/xml",     type: rss, tier: media,    status: ok }
      - { name: FiercePharma,                url: "https://www.fiercepharma.com/rss/xml",      type: rss, tier: media,    status: ok }
      - { name: STAT News,                   url: "https://www.statnews.com/feed/",            type: rss, tier: media,    status: ok }
      - name: Isomorphic Labs
        url: "https://www.isomorphiclabs.com/news"
        type: scrape
        tier: official
        status: todo
        enabled: false
        # 备好的选择器(2026-07-02 实测可解析 20+ 篇):item_selector '.w-dyn-item' title_selector 'h3'
        note: >
          2026-07-02 探测:原 /articles 404,正确列表页是 /news(Webflow CMS,SSR)。选择器已验证
          (item '.w-dyn-item' + title 'h3' 可解析 20+ 篇文章)。⚠️ 但卡片无机器可读日期,而
          pipeline 对无日期条目一律保留(_within_window 返回 True),接入会把全部历史文章(可回溯到
          2021)永久灌进 ai_health 的 1 周窗口,污染"本周"视图。故暂不 enable——待引擎支持无日期源
          截断(如按列表顺序取 top-N),或改从文章详情页补日期后再接。
      - { name: Recursion,        url: "https://www.recursion.com/news",          type: scrape, tier: official, status: todo, enabled: false, note: "2026-07-02 探测:请求超时/被拦(curl 返回 000),站点疑似强反爬或需 JS。静态 scrape 不可达,暂缓" }
      - { name: Insilico Medicine,url: "https://insilico.com/news",               type: scrape, tier: official, status: todo, enabled: false, note: "2026-07-02 探测:/news 200 且 SSR,但卡片是指向 prnewswire/globenewswire 的外链新闻稿、无站内统一日期结构,抓取质量差(混入 2021-2022 旧稿)。同 Isomorphic 缺日期会污染 1 周窗口,暂缓" }
    note: ⚠️ 药明系(WuXi) 深度信息在 A股/H股公告(🟡)，暂缓，以后接公告适配器。

