      - { name: Alpha Architect,             url: "https://alphaarchitect.com/feed/", type: rss,   tier: media,      status: ok }
      - { name: Quantpedia,                  url: "https://quantpedia.com/feed/",     type: rss,   tier: media,      status: ok }
      - { name: "QuantSeeker (substack)",    url: "https://quantseeker.substack.com/feed", type: rss, tier: self_media, status: ok }
      - { name: "arXiv q-fin.PM", url: "http://export.arxiv.org/rss/q-fin.PM", type: arxiv, tier: official, status: ok }
      - { name: "arXiv q-fin.TR", url: "http://export.arxiv.org/rss/q-fin.TR", type: arxiv, tier: official, status: ok }
      - { name: "arXiv q-fin.ST", url: "http://export.arxiv.org/rss/q-fin.ST", type: arxiv, tier: official, status: ok }
    note: 国内量化（量化投资与机器学习 / 聚宽）在公众号，撞墙，暂缓。

